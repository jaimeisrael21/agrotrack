name: Integracion Continua (CI)

on:
  push:
    branches: ["develop"]
  pull_request:
    branches: ["develop"]

permissions:
  contents: read

jobs:
  build-test:
    name: Compilar y probar en develop
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Compilar codigo Java
        run: |
          mkdir -p out
          javac -d out src/ControlCalidad.java test/ControlCalidadTest.java

      - name: Ejecutar pruebas
        run: java -cp out ControlCalidadTest
